<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVA - Secure Client Portal</title>
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        /* Minimalist style to make the portal look premium */
        .portal-container {
            max-width: 600px;
            margin: 80px auto;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #39FF14; /* Your signature SVA green border */
            box-shadow: 0px 8px 32px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        .portal-btn {
            display: inline-block;
            background: #39FF14;
            color: #000;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            transition: 0.2s;
        }
        .portal-btn:hover {
            background: #2ecc0b;
        }
    </style>
</head>
<body>
    <div class="portal-container">
        <h1 style="color: #fff; margin-bottom: 10px;">🔐 SVA Secure Portal</h1>
        <p style="color: #ccc; font-size: 1.1rem;">Authorized Access Only</p>
        <hr style="border-color: rgba(255,255,255,0.1); margin: 20px 0;">
        <p style="color: #aaa;">This area is reserved for specialized vehicle diagnostics, private documentation, or client-specific resources.</p>
        
        <!-- BUTTON GROUP -->
        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <a href="../index.html" class="portal-btn">Return Home</a>
            <!-- Official Cloudflare Logout Hook -->
            <a href="/cdn-cgi/access/logout" class="portal-btn" style="background: #333; color: #fff; border: 1px solid #555;">Log Out</a>
        </div>
    </div>

</body>
</html>
